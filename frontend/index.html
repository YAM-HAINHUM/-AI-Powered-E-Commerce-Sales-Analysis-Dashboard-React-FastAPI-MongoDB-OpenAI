<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>DataInsight AI</title>

    <!--
      Anti-flicker script — MUST be inline, MUST run before React.
      Reads localStorage and applies the correct class to <html>
      before the browser paints a single pixel.
    -->
    <script>
      (function () {
        var STORAGE_KEY = "datainsight-theme";
        var stored = null;
        try {
          stored = localStorage.getItem(STORAGE_KEY);
        } catch (_) {}

        var resolved;
        if (stored === "dark" || stored === "light") {
          resolved = stored;
        } else if (stored === "system" || stored === null) {
          resolved = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        } else {
          resolved = "dark"; // ultimate fallback
        }

        var root = document.documentElement;
        root.classList.remove("dark", "light");
        root.classList.add(resolved);
        root.style.colorScheme = resolved;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
